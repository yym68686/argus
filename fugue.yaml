version: 1
primary_service: web

services:
  gateway:
    network_mode: internal
    port: 8080
    build:
      strategy: dockerfile
      context: .
      dockerfile: apps/api/Dockerfile
    env:
      ARGUS_PROVISION_MODE: fugue
      ARGUS_DATABASE_URL: postgresql://argus:argus@postgres:5432/argus
      ARGUS_FUGUE_HOME_PATH: /data/argus
      ARGUS_FUGUE_WORKSPACE_STORAGE_SIZE: 1Gi
      ARGUS_PUBLIC_BASE_URL: https://argus.fugue.pro
      ARGUS_FUGUE_GATEWAY_COMPOSE_SERVICE: gateway
      ARGUS_FUGUE_RUNTIME_COMPOSE_SERVICE: runtime
      ARGUS_RUNTIME_CMD: codex app-server
    depends_on:
      - postgres
    persistent_storage:
      storage_size: 512Mi
      mounts:
        - kind: directory
          path: /data/argus

  postgres:
    type: postgres
    image: postgres:17.6-alpine
    service_name: postgres
    database: argus
    user: argus
    password: argus

  runtime:
    network_mode: internal
    port: 7777
    build:
      strategy: dockerfile
      context: .
      dockerfile: Dockerfile
    env:
      APP_SERVER_CMD: codex app-server
      ARGUS_CODEX_MCP_URL: http://gateway:8080/mcp

  web:
    public: true
    port: 80
    build:
      strategy: dockerfile
      context: apps/web
      dockerfile: Dockerfile
    env:
      ARGUS_GATEWAY_HTTP_URL: http://gateway:8080
    depends_on:
      - gateway

  telegram-bot:
    public: true
    port: 8080
    build:
      strategy: dockerfile
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    env:
      ARGUS_GATEWAY_HTTP_URL: http://gateway:8080
      ARGUS_GATEWAY_WS_URL: ws://gateway:8080/ws
      ARGUS_CWD: /workspace
      STATE_PATH: /data/state.json
      TELEGRAM_DELIVERY_MODE: auto
    depends_on:
      - gateway
    persistent_storage:
      storage_size: 256Mi
      mounts:
        - kind: directory
          path: /data
