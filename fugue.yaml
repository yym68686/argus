version: 1
primary_service: gateway

services:
  gateway:
    public: true
    port: 8080
    build:
      strategy: dockerfile
      context: .
      dockerfile: apps/api/Dockerfile
    env:
      ARGUS_PROVISION_MODE: fugue
      ARGUS_HOME_HOST_PATH: /data/argus
      ARGUS_FUGUE_GATEWAY_COMPOSE_SERVICE: gateway
      ARGUS_FUGUE_RUNTIME_COMPOSE_SERVICE: runtime
      ARGUS_RUNTIME_CMD: codex app-server
    volumes:
      - ./.fugue/gateway-data:/data/argus

  runtime:
    port: 7777
    build:
      strategy: dockerfile
      context: .
      dockerfile: Dockerfile
    env:
      APP_SERVER_CMD: codex app-server
      ARGUS_CODEX_MCP_URL: http://gateway:8080/mcp
