name: release-node-host

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish assets to (e.g. v0.1.0)."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: false

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Test
        working-directory: apps/node-host
        run: go test ./...

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          out_dir="dist/node-host"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          cd apps/node-host
          export CGO_ENABLED=0

          GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o "../../$out_dir/argus-darwin-arm64" ./cmd/argus
          GOOS=linux  GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "../../$out_dir/argus-linux-amd64"  ./cmd/argus
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "../../$out_dir/argus-windows-amd64.exe" ./cmd/argus

          cd "../../$out_dir"
          sha256sum argus-* > SHA256SUMS.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: dist/node-host/*
          fail_on_unmatched_files: true
          generate_release_notes: true
