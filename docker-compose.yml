services:
  # Builds the runtime TCP bridge image that the gateway will spawn dynamically.
  # This container exits immediately; the image is what's needed.
  runtime-image:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_SERVER_INSTALL_CMD: ${ARGUS_RUNTIME_INSTALL_CMD:-npm i -g @openai/codex}
    image: argus-runtime
    command: ["sh", "-lc", "echo 'runtime image built'"]

  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_DB: ${ARGUS_POSTGRES_DB:-argus}
      POSTGRES_USER: ${ARGUS_POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${ARGUS_POSTGRES_PASSWORD:-argus}
    volumes:
      - argus-postgres-data:/var/lib/postgresql/data
    networks:
      - argus-db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ARGUS_POSTGRES_USER:-argus} -d ${ARGUS_POSTGRES_DB:-argus}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: argus-gateway
    depends_on:
      runtime-image:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      ARGUS_PROVISION_MODE: ${ARGUS_PROVISION_MODE:-auto}
      ARGUS_RUNTIME_IMAGE: argus-runtime
      ARGUS_DOCKER_NETWORK: argus-runtime-net
      ARGUS_HOME_HOST_PATH: ${ARGUS_HOME_HOST_PATH:-${HOME}/.argus}
      ARGUS_DATABASE_URL: ${ARGUS_DATABASE_URL:-postgresql://argus:argus@postgres:5432/argus}
      # Optional (advanced): base directory for auto-created `/ws` session workspaces; when unset, uses `${ARGUS_HOME_HOST_PATH}/workspaces`.
      ARGUS_WORKSPACE_HOST_PATH: ${ARGUS_WORKSPACE_HOST_PATH:-}
      # Command executed inside each spawned runtime container.
      ARGUS_RUNTIME_CMD: ${ARGUS_RUNTIME_CMD:-codex app-server}
      # Optional: require auth for /ws (Authorization: Bearer ... or ?token=...).
      ARGUS_TOKEN: ${ARGUS_TOKEN:-}
      # Optional: OpenAI key held by the gateway (used by /openai proxy; not passed to runtimes).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Optional: master secret for derived OpenAI proxy tokens (fallback: ARGUS_TOKEN).
      ARGUS_OPENAI_TOKEN: ${ARGUS_OPENAI_TOKEN:-}
      # Optional: override OpenAI Responses upstream URL for the gateway proxy.
      ARGUS_OPENAI_RESPONSES_UPSTREAM_URL: ${ARGUS_OPENAI_RESPONSES_UPSTREAM_URL:-}
      # Optional: separate auth scopes (fallback to ARGUS_TOKEN when unset).
      ARGUS_NODE_TOKEN: ${ARGUS_NODE_TOKEN:-}
      ARGUS_MCP_TOKEN: ${ARGUS_MCP_TOKEN:-}
      # Optional: enable gateway-owned Telegram delivery (outbound). Inbound is handled by the tg bot/webhook.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_DRAFT_STREAMING: ${TELEGRAM_DRAFT_STREAMING:-auto}
      # Optional: runtime session container resource limits (applied when the gateway spawns containers).
      ARGUS_RUNTIME_CPUS: ${ARGUS_RUNTIME_CPUS:-}
      ARGUS_RUNTIME_MEM_LIMIT: ${ARGUS_RUNTIME_MEM_LIMIT:-}
      ARGUS_RUNTIME_MEMSWAP_LIMIT: ${ARGUS_RUNTIME_MEMSWAP_LIMIT:-}
      ARGUS_RUNTIME_PIDS_LIMIT: ${ARGUS_RUNTIME_PIDS_LIMIT:-}
      # Optional: docker provision tuning.
      ARGUS_CONNECT_TIMEOUT_S: ${ARGUS_CONNECT_TIMEOUT_S:-30}
      ARGUS_CONTAINER_PREFIX: ${ARGUS_CONTAINER_PREFIX:-argus-session}
      # Orphan runtime container GC on gateway startup (default: delete). Set `ARGUS_GC_DELETE_ORPHAN_RUNTIMES=off` to disable.
      ARGUS_GC_DELETE_ORPHAN_RUNTIMES: ${ARGUS_GC_DELETE_ORPHAN_RUNTIMES:-}
    volumes:
      # WARNING: mounting the Docker socket grants root-equivalent access to the host.
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock
      # Persist local workspace mirrors (and sqlite fallback files when ARGUS_DATABASE_URL is unset).
      - ${ARGUS_HOME_HOST_PATH:-${HOME}/.argus}:${ARGUS_HOME_HOST_PATH:-${HOME}/.argus}
    ports:
      - "8080:8080"
    networks:
      - argus-db-net
      - argus-runtime-net
    restart: unless-stopped

  web:
    profiles: ["web"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ARGUS_WS_URL: ${NEXT_PUBLIC_ARGUS_WS_URL:-}
    image: argus-web
    ports:
      - "3000:80"
    restart: unless-stopped

  telegram-bot:
    profiles: ["tg"]
    build:
      context: .
      dockerfile: apps/telegram-bot/Dockerfile
    image: argus-telegram-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ARGUS_TOKEN: ${ARGUS_TOKEN:-}
      # Optional: restrict /newmain usage to a comma-separated allowlist of private chat ids.
      # Example: TELEGRAM_ADMIN_CHAT_IDS=123456789,987654321
      TELEGRAM_ADMIN_CHAT_IDS: ${TELEGRAM_ADMIN_CHAT_IDS:-}
      TELEGRAM_DRAFT_STREAMING: ${TELEGRAM_DRAFT_STREAMING:-auto}
      HOST: ${HOST:-gateway}
    volumes:
      - telegram-bot-data:/data
    networks:
      - argus-runtime-net
    restart: unless-stopped

networks:
  argus-db-net:
    name: argus-db-net
  argus-runtime-net:
    name: argus-runtime-net

volumes:
  telegram-bot-data:
    name: argus-telegram-bot-data
  argus-postgres-data:
    name: argus-postgres-data
